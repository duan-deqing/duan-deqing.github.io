<!DOCTYPE html>
<html lang="zh">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>404 NOT FOUND</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&family=Roboto:wght@300;400;500;700&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Noto Sans SC", "Roboto", sans-serif;
        background-color: #ffffff;
        color: #111827;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      @media (prefers-color-scheme: dark) {
        body {
          background-color: #0f172a;
          color: #f1f5f9;
        }
      }

      .container {
        text-align: center;
        padding: 2rem;
      }

      .error-code {
        font-family: "Roboto", sans-serif;
        font-size: 8rem;
        font-weight: 700;
        color: #3b82f6;
        line-height: 1;
        margin-bottom: 1rem;
      }

      .error-message {
        font-size: 1.5rem;
        font-weight: 500;
        margin-bottom: 0.5rem;
      }

      .error-description {
        font-size: 1rem;
        color: #6b7280;
        margin-bottom: 2rem;
      }

      @media (prefers-color-scheme: dark) {
        .error-description {
          color: #9ca3af;
        }
      }

      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-width: 140px;
        height: 48px;
        padding-left: 2rem;
        padding-right: 2rem;
        border-radius: 100px;
        font-weight: 500;
        font-size: 1rem;
        text-decoration: none;
        transition: all 0.3s ease;
        cursor: pointer;
        border: none;
      }

      .btn-primary {
        background-color: #3b82f6;
        color: white;
      }

      .btn-primary:hover {
        background-color: #2563eb;
        box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1),
          0 4px 6px -2px rgba(0, 0, 0, 0.05);
      }

      .loading {
        display: none;
        margin-top: 2rem;
      }

      .spinner {
        width: 2rem;
        height: 2rem;
        border: 3px solid #e5e7eb;
        border-top-color: #3b82f6;
        border-radius: 50%;
        animation: spin 1s linear infinite;
        margin: 0 auto;
      }

      @media (prefers-color-scheme: dark) {
        .spinner {
          border-color: #374151;
          border-top-color: #3b82f6;
        }
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      .loading-text {
        margin-top: 0.5rem;
        font-size: 0.875rem;
        color: #6b7280;
      }

      @media (prefers-color-scheme: dark) {
        .loading-text {
          color: #9ca3af;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="error-code">404</div>
      <h1 class="error-message">页面未找到</h1>
      <p class="error-description">您访问的页面不存在或已被移动</p>
      <a href="/" class="btn btn-primary">返回首页</a>
      <div class="loading" id="loading">
        <div class="spinner"></div>
        <p class="loading-text">正在重定向...</p>
      </div>
    </div>

    <script>
      // GitHub Pages SPA 路由重定向
      // https://github.com/rafgraph/spa-github-pages
      // 将 404 页面重定向到 index.html，并将原始路径保存在查询参数中
      (function() {
        var pathSegmentsToKeep = 0; // 保留的路径段数，0 表示根目录
        var l = window.location;
        
        // 构建重定向 URL
        // 将原始路径编码到查询参数中
        var redirectUrl = l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
          l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
          l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
          l.search.slice(1).replace(/&/g, '~and~') +
          l.hash;
        
        // 执行重定向
        window.location.replace(redirectUrl);
      })();
    </script>
  </body>
</html>

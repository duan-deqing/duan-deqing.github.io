<!DOCTYPE html>
<html lang="zh">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>STYLAN</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Noto Sans SC", "Roboto", sans-serif;
        background-color: #ffffff;
        color: #111827;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      @media (prefers-color-scheme: dark) {
        body {
          background-color: #0f172a;
          color: #f1f5f9;
        }
      }

      .loading-container {
        text-align: center;
        padding: 2rem;
      }

      .logo {
        font-family: "Geist Pixel", monospace;
        font-size: 1.5rem;
        font-weight: 600;
        margin-bottom: 2rem;
        color: #111827;
      }

      @media (prefers-color-scheme: dark) {
        .logo {
          color: #f1f5f9;
        }
      }

      .spinner {
        width: 3rem;
        height: 3rem;
        border: 3px solid #e5e7eb;
        border-top-color: #3b82f6;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
        margin: 0 auto 1rem;
      }

      @media (prefers-color-scheme: dark) {
        .spinner {
          border-color: #374151;
          border-top-color: #3b82f6;
        }
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      .loading-text {
        font-size: 0.875rem;
        color: #6b7280;
      }

      @media (prefers-color-scheme: dark) {
        .loading-text {
          color: #9ca3af;
        }
      }

      .progress-bar {
        width: 200px;
        height: 3px;
        background-color: #e5e7eb;
        border-radius: 3px;
        overflow: hidden;
        margin: 1.5rem auto 0;
      }

      @media (prefers-color-scheme: dark) {
        .progress-bar {
          background-color: #374151;
        }
      }

      .progress-fill {
        height: 100%;
        background-color: #3b82f6;
        border-radius: 3px;
        animation: progress 1.5s ease-in-out;
      }

      @keyframes progress {
        0% {
          width: 0%;
        }
        50% {
          width: 70%;
        }
        100% {
          width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <div class="loading-container">
      <div class="logo">STYLAN</div>
      <div class="spinner"></div>
      <p class="loading-text">页面加载中...</p>
      <div class="progress-bar">
        <div class="progress-fill"></div>
      </div>
    </div>

    <script>
      // GitHub Pages SPA 路由重定向
      // https://github.com/rafgraph/spa-github-pages
      (function() {
        var l = window.location;
        
        // 构建重定向 URL
        // 将原始路径编码到查询参数中
        var segmentsToKeep = 0;
        var redirectUrl = l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
          l.pathname.split('/').slice(0, 1 + segmentsToKeep).join('/') + '/?/' +
          l.pathname.slice(1).split('/').slice(segmentsToKeep).join('/').replace(/&/g, '~and~') +
          l.search.slice(1).replace(/&/g, '~and~') +
          l.hash;
        
        // 短暂延迟后重定向，让用户看到加载动画
        setTimeout(function() {
          window.location.replace(redirectUrl);
        }, 100);
      })();
    </script>
  </body>
</html>
